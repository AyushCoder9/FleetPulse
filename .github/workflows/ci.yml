name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: fleetpulse_test
          POSTGRES_USER: fleetpulse
          POSTGRES_PASSWORD: fleetpulse
        ports:
          - '5432:5432'
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - '6379:6379'
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt
        working-directory: backend

      - name: Lint with ruff
        run: ruff check .
        working-directory: backend

      - name: Run tests
        run: pytest --cov=apps --cov-report=term-missing -v
        working-directory: backend
        env:
          DJANGO_SETTINGS_MODULE: config.settings.dev
          DATABASE_URL: postgresql://fleetpulse:fleetpulse@localhost:5432/fleetpulse_test
          REDIS_URL: redis://localhost:6379/0
          DJANGO_SECRET_KEY: ci-secret-key-not-used-in-prod

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install
        working-directory: frontend

      - name: Build
        run: pnpm build
        working-directory: frontend
