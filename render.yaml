services:
  - type: web
    name: fleetpulse-api
    runtime: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate && (python manage.py createsuperuser --noinput 2>/dev/null; true) && python manage.py seed_demo_data
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    rootDir: backend
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.prod
      - key: DATABASE_URL
        fromDatabase:
          name: fleetpulse-db
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_SUPERUSER_USERNAME
        value: admin
      - key: DJANGO_SUPERUSER_EMAIL
        value: admin@fleetpulse.com
      - key: DJANGO_SUPERUSER_PASSWORD
        generateValue: true
      - key: CORS_ALLOWED_ORIGINS
        value: https://fleetpulse-blue.vercel.app
      - key: CELERY_TASK_ALWAYS_EAGER
        value: "True"
      - key: REDIS_URL
        value: redis://localhost:6379/0

databases:
  - name: fleetpulse-db
    databaseName: fleetpulse
    user: fleetpulse
    plan: free
