services:
  - type: web
    name: fleetpulse-api
    runtime: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    rootDir: backend
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.prod
      - key: DATABASE_URL
        fromDatabase:
          name: fleetpulse-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: fleetpulse-redis
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: CORS_ALLOWED_ORIGINS
        value: https://fleetpulse-blue.vercel.app

  - type: worker
    name: fleetpulse-worker
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A config worker -l info
    rootDir: backend
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.prod
      - key: DATABASE_URL
        fromDatabase:
          name: fleetpulse-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: fleetpulse-redis
          property: connectionString
      - key: DJANGO_SECRET_KEY
        sync: false

databases:
  - name: fleetpulse-db
    databaseName: fleetpulse
    user: fleetpulse
    plan: free

redis:
  - name: fleetpulse-redis
    plan: free
