version: '3.9'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: fleetpulse
      POSTGRES_USER: fleetpulse
      POSTGRES_PASSWORD: fleetpulse
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U fleetpulse']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: ./backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - '8000:8000'
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.dev
      DATABASE_URL: postgresql://fleetpulse:fleetpulse@db:5432/fleetpulse
      REDIS_URL: redis://redis:6379/0
      DJANGO_SECRET_KEY: dev-secret-key-change-in-prod
      CORS_ALLOWED_ORIGINS: http://localhost:5173
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: ./backend
    command: celery -A config worker -l info
    volumes:
      - ./backend:/app
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.dev
      DATABASE_URL: postgresql://fleetpulse:fleetpulse@db:5432/fleetpulse
      REDIS_URL: redis://redis:6379/0
      DJANGO_SECRET_KEY: dev-secret-key-change-in-prod
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  beat:
    build: ./backend
    command: celery -A config beat -l info
    volumes:
      - ./backend:/app
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.dev
      DATABASE_URL: postgresql://fleetpulse:fleetpulse@db:5432/fleetpulse
      REDIS_URL: redis://redis:6379/0
      DJANGO_SECRET_KEY: dev-secret-key-change-in-prod
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
