<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Outer badge -->
  <rect width="200" height="200" rx="42" fill="#0a0a0a"/>

  <!-- Truck body (cargo + cab, side profile) -->
  <!-- Cargo box -->
  <rect x="18" y="54" width="98" height="72" rx="7" fill="#f59e0b"/>
  <!-- Cab section -->
  <path d="M116 70 L116 126 L158 126 L158 96 L143 70 Z" fill="#f59e0b"/>
  <!-- Cab window -->
  <path d="M120 76 L120 108 L152 108 L152 97 L139 76 Z" fill="#0a0a0a" opacity="0.5"/>
  <!-- Cargo door lines -->
  <line x1="68" y1="58" x2="68" y2="122" stroke="#0a0a0a" stroke-width="3" opacity="0.35"/>
  <!-- Front grill -->
  <rect x="156" y="106" width="6" height="16" rx="2" fill="#0a0a0a" opacity="0.4"/>

  <!-- Wheels -->
  <circle cx="48" cy="134" r="22" fill="#1a1a1a"/>
  <circle cx="48" cy="134" r="13" fill="#f59e0b"/>
  <circle cx="48" cy="134" r="5" fill="#0a0a0a"/>
  <circle cx="138" cy="134" r="22" fill="#1a1a1a"/>
  <circle cx="138" cy="134" r="13" fill="#f59e0b"/>
  <circle cx="138" cy="134" r="5" fill="#0a0a0a"/>

  <!-- ECG pulse line at bottom — the "Pulse" in FleetPulse -->
  <polyline
    points="10,172 36,172 48,148 60,188 70,160 82,172 190,172"
    stroke="#f59e0b"
    stroke-width="6.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />
</svg>
